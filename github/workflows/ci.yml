

name: Advanced CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Code lao
        uses: actions/checkout@v3

      - name: Node.js setup karo
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Dependencies install karo
        run: npm install

      - name: Tests chalao
        run: npm test

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy karo
        run: echo "✅ Tests pass ho gaye — Deploying to production!"
